services:
  # PostgreSQL Database (shared across all services)
  postgres:
    image: postgres:15-alpine
    container_name: voca-ai-engine-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voca_ai_db}
      POSTGRES_USER: ${POSTGRES_USER:-voca_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voca_password}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-trust}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voca_user} -d ${POSTGRES_DB:-voca_ai_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voca-ai-engine-network

  # Voca AI Engine - Main FastAPI application
  voca-ai-engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.voca-ai-engine
    container_name: voca-ai-engine
    env_file:
      - .env
    environment:
      # Database configuration
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-voca_user}:${POSTGRES_PASSWORD:-voca_password}@postgres:5432/${POSTGRES_DB:-voca_ai_db}}
      POSTGRES_HOST: ${DB_HOST:-postgres}
      POSTGRES_PORT: ${DB_PORT:-5432}
      POSTGRES_DB: ${DB_NAME:-voca_ai_db}
      POSTGRES_USER: ${DB_USER:-voca_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-voca_password}
      
      # Application configuration
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      
      # JWT configuration
      JWT_SECRET: ${JWT_SECRET}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      
      # AWS configuration
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      
      # Service URLs
      VOCA_OS_URL: http://voca-os:3001
      VOCA_CONNECT_URL: http://voca-connect:8001
      
      # CORS configuration
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      
    ports:
      - "5008:8008"
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
      - ./shared-utils:/app/shared-utils
      - /app/app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - voca-ai-engine-network
    restart: unless-stopped
    profiles:
      - engine

  # Voca OS - Node.js Agent Service
  voca-os:
    build:
      context: ./services/voca-os
      dockerfile: Dockerfile
    container_name: voca-ai-engine-voca-os
    env_file:
      - .env
    environment:
      # Database configuration
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-voca_user}:${POSTGRES_PASSWORD:-voca_password}@postgres:5432/${POSTGRES_DB:-voca_ai_db}}
      POSTGRES_HOST: ${DB_HOST:-postgres}
      POSTGRES_PORT: ${DB_PORT:-5432}
      POSTGRES_DB: ${DB_NAME:-voca_ai_db}
      POSTGRES_USER: ${DB_USER:-voca_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-voca_password}
      
      # Application configuration
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      
      # AWS configuration
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      S3_CHARACTER_BUCKET: ${S3_CHARACTER_BUCKET:-voca-ai-character-store}
      
      # Service URLs
      VOCA_AI_ENGINE_URL: http://voca-ai-engine:8008
      
    ports:
      - "5001:3001"
    volumes:
      - ./services/voca-os/characters:/app/characters
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - voca-ai-engine-network
    restart: unless-stopped
    profiles:
      - voca-os

  # Voca Connect - FastAPI AWS Connect Service
  voca-connect:
    build:
      context: ./services/voca-connect
      dockerfile: ../../docker/Dockerfile.voca-connect
    container_name: voca-ai-engine-voca-connect
    env_file:
      - .env
    environment:
      # Database configuration
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-voca_user}:${POSTGRES_PASSWORD:-voca_password}@postgres:5432/${POSTGRES_DB:-voca_ai_db}}
      POSTGRES_HOST: ${DB_HOST:-postgres}
      POSTGRES_PORT: ${DB_PORT:-5432}
      POSTGRES_DB: ${DB_NAME:-voca_ai_db}
      POSTGRES_USER: ${DB_USER:-voca_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-voca_password}
      
      # Application configuration
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      
      # AWS configuration
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      
      # Service URLs
      VOCA_AI_ENGINE_URL: http://voca-ai-engine:8008
      
      # AWS Connect configuration
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      CONNECT_INSTANCE_ALIAS_PREFIX: ${CONNECT_INSTANCE_ALIAS_PREFIX:-voca-connect}
      LAMBDA_FUNCTION_PREFIX: ${LAMBDA_FUNCTION_PREFIX:-voca-lambda}
      
      # CORS configuration
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      
    ports:
      - "5002:8001"
    volumes:
      - ./config/voca-connect:/app/config
      - ./lambda-functions:/app/lambda
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - voca-ai-engine-network
    restart: unless-stopped
    profiles:
      - voca-connect

volumes:
  postgres_data:
    driver: local

networks:
  voca-ai-engine-network:
    driver: bridge
